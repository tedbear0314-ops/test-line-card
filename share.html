<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>轉分享</title>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    :root {
      --line: #06c755;
      --ink: #1f2937;
      --muted: #6b7280;
      --border: #d8dde6;
      --surface: #ffffff;
      --soft: #eef3f8;
      --accent: #064887;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Microsoft JhengHei", "Noto Sans TC", sans-serif;
      color: var(--ink);
      background: var(--soft);
    }

    .app {
      width: min(760px, 100%);
      margin: 0 auto;
      padding: 18px;
    }

    header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      padding: 16px 0 14px;
    }

    h1 {
      margin: 0;
      font-size: 1.45rem;
      line-height: 1.35;
    }

    .note {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 0.94rem;
      line-height: 1.6;
    }

    .status {
      min-width: 88px;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--muted);
      font-size: 0.82rem;
      text-align: center;
    }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 2;
      padding: 12px;
      margin-bottom: 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 8px 20px rgba(31, 41, 55, 0.08);
    }

    .primary {
      width: 100%;
      min-height: 48px;
      border: 0;
      border-radius: 8px;
      background: var(--line);
      color: white;
      font-size: 1rem;
      font-weight: 900;
      cursor: pointer;
    }

    .primary:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }

    .intro {
      display: none;
      padding: 14px;
      margin-bottom: 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      line-height: 1.65;
      white-space: pre-wrap;
    }

    .intro.show {
      display: block;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      padding-bottom: 20px;
    }

    .card {
      position: relative;
      overflow: hidden;
      border: 2px solid transparent;
      border-radius: 8px;
      background: var(--surface);
      box-shadow: 0 6px 18px rgba(31, 41, 55, 0.08);
      cursor: pointer;
    }

    .card.selected {
      border-color: var(--line);
    }

    .card:focus {
      outline: none;
    }

    .card:focus-visible {
      outline: 3px solid rgba(6, 199, 85, 0.26);
      outline-offset: 2px;
    }

    .check {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.92);
      color: transparent;
      font-weight: 900;
    }

    .selected .check {
      background: var(--line);
      color: white;
    }

    .card img {
      display: block;
      width: 100%;
      aspect-ratio: 1.45 / 1;
      object-fit: contain;
      background: #fff;
    }

    @media (max-width: 560px) {
      .app {
        padding: 12px;
      }

      h1 {
        font-size: 1.18rem;
      }

      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <div>
        <h1>轉分享內容</h1>
        <p class="note">挑幾個你覺得適合的內容，再轉分享給朋友就好。</p>
      </div>
      <div class="status" id="status">初始化</div>
    </header>

    <section class="toolbar">
      <button class="primary" type="button" id="shareButton" disabled>轉分享到 LINE</button>
    </section>

    <section class="intro" id="introBox"></section>
    <section class="grid" id="grid"></section>
  </main>

  <script>
    const LIFF_ID = "2010086405-TfMqpBlJ";
    const GOOGLE_SHEET_DATA_URL = "https://script.google.com/macros/s/AKfycbyUwM1x3S6jrYxGGe_pSAZZ2BB4Mw4qpsTohvjqqxAoYjtrymMZqWkx9guAfn9y09VJ-w/exec";

    const statusEl = document.querySelector("#status");
    const shareButton = document.querySelector("#shareButton");
    const grid = document.querySelector("#grid");
    const introBox = document.querySelector("#introBox");
    let liffReady = false;
    let shareSet = null;
    const selected = new Map();

    function toAbsoluteUrl(url) {
      return new URL(url, window.location.href).href;
    }

    function normalizePhoneUri(phone) {
      const normalized = String(phone || "").replace(/[^\d+]/g, "");
      return normalized ? `tel:${normalized}` : "";
    }

    function getShareId() {
      return new URLSearchParams(window.location.search).get("id") || "";
    }

    async function initLiff() {
      try {
        await liff.init({ liffId: LIFF_ID });
        liffReady = true;
        statusEl.textContent = liff.isLoggedIn() ? "已登入" : "未登入";
      } catch (error) {
        console.error(error);
        statusEl.textContent = "LIFF 錯誤";
        alert("LIFF 初始化失敗，請確認 LIFF ID 與 Endpoint URL 設定。");
      }
    }

    async function loadShareSet() {
      const shareId = getShareId();
      if (!shareId) {
        statusEl.textContent = "缺少資料";
        grid.innerHTML = '<p class="note">缺少分享代碼，無法讀取內容。</p>';
        return;
      }

      try {
        statusEl.textContent = "讀取資料";
        const url = new URL(GOOGLE_SHEET_DATA_URL);
        url.searchParams.set("action", "get_share_set");
        url.searchParams.set("id", shareId);
        const response = await fetch(url.href, { cache: "no-store" });
        if (!response.ok) throw new Error("讀不到分享包。");

        shareSet = await response.json();
        if (!Array.isArray(shareSet.items)) throw new Error("分享包格式錯誤。");

        selected.clear();
        shareSet.items.forEach((item, index) => {
          selected.set(getItemKey(item, index), item);
        });
        renderShareSet();
        updateSelectionUi();
        statusEl.textContent = liffReady && liff.isLoggedIn() ? "已登入" : "可分享";
      } catch (error) {
        console.error(error);
        statusEl.textContent = "資料錯誤";
        grid.innerHTML = '<p class="note">讀取分享內容失敗。請確認分享連結仍然有效。</p>';
      }
    }

    function getItemKey(item, index) {
      return `${item.id || "share-item"}-${index}`;
    }

    function updateSelectionUi() {
      const count = selected.size;
      shareButton.disabled = count === 0;
      shareButton.textContent = count > 0 ? `轉分享 ${count} 張到 LINE` : "先選幾張想分享的內容";

      document.querySelectorAll(".card").forEach(card => {
        card.classList.toggle("selected", selected.has(card.dataset.key));
        card.setAttribute("aria-pressed", String(selected.has(card.dataset.key)));
      });
    }

    function toggleItem(item, key) {
      if (selected.has(key)) {
        selected.delete(key);
      } else {
        selected.set(key, item);
      }
      updateSelectionUi();
    }

    function renderShareSet() {
      grid.innerHTML = "";

      const introText = String(shareSet.intro_text || "").trim();
      introBox.textContent = introText;
      introBox.classList.toggle("show", Boolean(introText));

      shareSet.items.forEach((item, index) => {
        const key = getItemKey(item, index);
        const card = document.createElement("article");
        card.className = "card";
        card.dataset.key = key;
        card.tabIndex = 0;
        card.setAttribute("role", "button");
        card.setAttribute("aria-pressed", "true");

        const image = document.createElement("img");
        image.src = item.url;
        image.alt = item.category === "business_card" ? "數位名片" : "分享圖片";
        image.loading = "lazy";

        const check = document.createElement("span");
        check.className = "check";
        check.textContent = "✓";

        card.append(check, image);
        card.addEventListener("click", () => toggleItem(item, key));
        card.addEventListener("keydown", event => {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            toggleItem(item, key);
          }
        });
        grid.appendChild(card);
      });

      updateSelectionUi();
    }

    function buildFlexBubble(item) {
      if (item.category === "business_card") {
        return buildBusinessCardBubble({ ...item, shareUrl: window.location.href });
      }

      const imageUrl = toAbsoluteUrl(item.url);
      const hero = {
        type: "image",
        url: imageUrl,
        size: "full",
        aspectRatio: item.aspectRatio || "20:13",
        aspectMode: "fit",
        backgroundColor: "#FFFFFF"
      };

      if (item.linkUrl) {
        hero.action = {
          type: "uri",
          label: "查看詳細內容",
          uri: item.linkUrl
        };
      }

      return {
        type: "bubble",
        hero
      };
    }

    function buildBusinessCardBubble(item) {
      const imageUrl = toAbsoluteUrl(item.url);
      const logoUrl = "https://www.nanshanlife.com.tw/nsclub/resources/images/logo1.png";
      const theme = {
        navy: "#064887",
        deepNavy: "#05366B",
        background: "#F4F8FB",
        muted: "#667085",
        line: "#06C755",
        phone: "#0758A8",
        divider: "#D7E3EF"
      };
      const bodyContents = [
        {
          type: "image",
          url: logoUrl,
          size: "sm",
          aspectRatio: "4:1",
          aspectMode: "fit",
          align: "start"
        }
      ];
      const identityContents = [];
      const actionButtons = [];
      const phoneUri = normalizePhoneUri(item.phone);

      if (item.displayName) {
        identityContents.push({ type: "text", text: item.displayName, weight: "bold", size: "lg", color: theme.deepNavy, wrap: true, margin: "xs" });
      }
      if (item.jobTitle) {
        identityContents.push({ type: "text", text: item.jobTitle, size: "xs", color: theme.navy, wrap: true, margin: "xs" });
      }
      if (item.companyName) {
        identityContents.push({ type: "text", text: item.companyName, size: "xxs", color: theme.muted, wrap: true, margin: "xs" });
      }
      if (item.tagline) {
        identityContents.push({ type: "text", text: item.tagline, weight: "bold", size: "xxs", color: theme.deepNavy, wrap: true, margin: "xs" });
      }

      bodyContents.push({
        type: "box",
        layout: "vertical",
        spacing: "xs",
        margin: "md",
        contents: [
          { type: "image", url: imageUrl, size: "full", aspectRatio: "2:1", aspectMode: "fit", backgroundColor: "#FFFFFF", flex: 0 },
          { type: "box", layout: "vertical", spacing: "xs", margin: "sm", contents: identityContents }
        ]
      });
      bodyContents.push({ type: "box", layout: "vertical", height: "3px", margin: "md", backgroundColor: theme.navy, contents: [] });

      if (phoneUri) {
        actionButtons.push({ type: "button", style: "primary", color: theme.phone, action: { type: "uri", label: "來電", uri: phoneUri } });
      }
      if (item.lineFriendUrl) {
        actionButtons.push({ type: "button", style: "primary", color: theme.line, action: { type: "uri", label: "加 LINE", uri: item.lineFriendUrl } });
      }
      if (item.shareUrl) {
        actionButtons.push({ type: "button", style: "secondary", action: { type: "uri", label: "轉分享", uri: item.shareUrl } });
      }
      if (actionButtons.length > 0) {
        bodyContents.push({ type: "box", layout: actionButtons.length > 2 ? "vertical" : "horizontal", spacing: "xs", margin: "md", contents: actionButtons });
      }

      return {
        type: "bubble",
        body: {
          type: "box",
          layout: "vertical",
          spacing: "xs",
          justifyContent: "center",
          paddingAll: "14px",
          backgroundColor: theme.background,
          contents: bodyContents
        },
        styles: {
          body: {
            backgroundColor: theme.background
          }
        }
      };
    }

    function buildFlexMessages(items) {
      const messages = [];

      for (let i = 0; i < items.length; i += 12) {
        messages.push({
          type: "flex",
          altText: "轉分享內容",
          contents: {
            type: "carousel",
            contents: items.slice(i, i + 12).map(buildFlexBubble)
          }
        });
      }

      return messages;
    }

    function getCloudinaryImageUrl(url, transformation) {
      const absoluteUrl = toAbsoluteUrl(url);
      return absoluteUrl.replace("/image/upload/", `/image/upload/${transformation}/`);
    }

    function getLineImageUrls(url) {
      const absoluteUrl = toAbsoluteUrl(url);
      if (!absoluteUrl.includes("/image/upload/")) {
        return {
          originalContentUrl: absoluteUrl,
          previewImageUrl: absoluteUrl
        };
      }

      return {
        originalContentUrl: getCloudinaryImageUrl(absoluteUrl, "f_jpg,q_auto:good,w_1200,c_limit"),
        previewImageUrl: getCloudinaryImageUrl(absoluteUrl, "f_jpg,q_auto:eco,w_640,c_limit")
      };
    }

    async function shareAgain() {
      if (!shareSet || !Array.isArray(shareSet.items) || shareSet.items.length === 0) return;

      const selectedItems = Array.from(selected.values());
      if (selectedItems.length === 0) {
        alert("先挑幾張想分享的內容。");
        return;
      }

      if (!liffReady) {
        alert("LIFF 尚未初始化完成，請稍後再試。");
        return;
      }

      if (!liff.isLoggedIn()) {
        liff.login();
        return;
      }

      const messages = buildFlexMessages(selectedItems);
      console.log("轉分享內容", selectedItems.map(item => ({
        category: item.category,
        url: item.url,
        displayName: item.displayName || ""
      })));
      const introText = String(shareSet.intro_text || "").trim();
      if (introText) {
        messages.unshift({
          type: "text",
          text: introText
        });
      }

      try {
        statusEl.textContent = "分享中";
        const result = await liff.shareTargetPicker(messages, { isMultiple: true });
        statusEl.textContent = result ? "已登入" : "已取消";
      } catch (error) {
        console.error(error);
        statusEl.textContent = "分享錯誤";
        alert("轉分享失敗，請確認 LINE Developers 已啟用 Share target picker。");
      }
    }

    shareButton.addEventListener("click", shareAgain);
    initLiff();
    loadShareSet();
  </script>
</body>
</html>
