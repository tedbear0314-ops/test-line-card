<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>TED 客戶資訊分享</title>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    :root {
      --line: #06c755;
      --ink: #1f2937;
      --muted: #6b7280;
      --border: #d8dde6;
      --surface: #ffffff;
      --soft: #f4f7fb;
      --accent: #2563eb;
      --warn: #b45309;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Microsoft JhengHei", "Noto Sans TC", sans-serif;
      color: var(--ink);
      background: #eef3f8;
    }

    .app {
      width: min(960px, 100%);
      margin: 0 auto;
      padding: 18px;
    }

    header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      padding: 16px 0 14px;
    }

    h1 {
      margin: 0;
      font-size: 1.45rem;
      line-height: 1.35;
    }

    .status {
      min-width: 88px;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--muted);
      font-size: 0.82rem;
      text-align: center;
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin: 8px 0 16px;
    }

    .tab {
      padding: 11px 8px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--ink);
      font-weight: 700;
      cursor: pointer;
    }

    .tab.active {
      border-color: var(--accent);
      background: #eaf1ff;
      color: #1746a2;
    }

    .panel {
      display: none;
    }

    .panel.active {
      display: block;
    }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 2;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      padding: 12px;
      margin-bottom: 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 8px 20px rgba(31, 41, 55, 0.08);
    }

    .count {
      color: var(--muted);
      font-size: 0.92rem;
    }

    .primary {
      width: auto;
      min-width: 132px;
      padding: 12px 16px;
      border: 0;
      border-radius: 8px;
      background: var(--line);
      color: white;
      font-size: 0.98rem;
      font-weight: 800;
      cursor: pointer;
    }

    .primary:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }

    .secondary {
      display: inline-flex;
      width: 100%;
      min-height: 44px;
      align-items: center;
      justify-content: center;
      margin-top: 12px;
      padding: 11px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--ink);
      font-size: 0.95rem;
      font-weight: 800;
      text-decoration: none;
      cursor: pointer;
    }

    .secondary:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      padding: 4px 2px 20px;
    }

    .card {
      position: relative;
      overflow: hidden;
      border: 2px solid transparent;
      border-radius: 8px;
      background: var(--surface);
      box-shadow: 0 6px 18px rgba(31, 41, 55, 0.08);
      cursor: pointer;
    }

    .card.selected {
      border-color: var(--line);
    }

    .card:focus {
      outline: none;
    }

    .card:focus-visible {
      outline: 3px solid rgba(37, 99, 235, 0.3);
      outline-offset: 2px;
    }

    .card img {
      display: block;
      width: 100%;
      aspect-ratio: 1.45 / 1;
      object-fit: contain;
      background: #ffffff;
    }

    .check {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.92);
      color: transparent;
      font-weight: 900;
    }

    .selected .check {
      background: var(--line);
      color: white;
    }

    .upload-box {
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
    }

    input[type="file"] {
      width: 100%;
      padding: 12px;
      border: 1px dashed var(--border);
      border-radius: 8px;
      background: var(--soft);
    }

    .note {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.6;
    }

    .warning {
      color: var(--warn);
      font-weight: 700;
    }

    @media (max-width: 560px) {
      .app {
        padding: 12px;
      }

      header {
        align-items: stretch;
      }

      h1 {
        font-size: 1.18rem;
      }

      .tabs {
        grid-template-columns: 1fr;
      }

      .toolbar {
        align-items: stretch;
        flex-direction: column;
      }

      .primary {
        width: 100%;
      }

      .card {
        width: 100%;
      }

      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <div>
        <h1>客戶 LINE 圖片分享</h1>
        <p class="note">選好圖片後，LINE 會讓你選擇要分享的客戶或群組。</p>
      </div>
      <div class="status" id="status">初始化</div>
    </header>

    <nav class="tabs" aria-label="圖片分類">
      <button class="tab active" type="button" data-tab="program">節日定聯</button>
      <button class="tab" type="button" data-tab="info">資訊分享</button>
      <button class="tab" type="button" data-tab="phone">手機相片</button>
    </nav>

    <section class="toolbar">
      <div class="count" id="selectedCount">已選 0 張</div>
      <button class="primary" type="button" id="shareButton" disabled>分享到 LINE</button>
    </section>

    <section class="panel active" id="programPanel">
      <div class="grid" id="programGrid"></div>
    </section>

    <section class="panel" id="infoPanel">
      <div class="grid" id="infoGrid"></div>
    </section>

    <section class="panel" id="phonePanel">
      <div class="upload-box">
        <button class="secondary" type="button" id="githubUploadButton">開啟 GitHub 上傳圖片</button>
        <p class="note">
          固定要分享的節日圖片、新聞、保險、財經資訊，建議上傳到 GitHub 的 <span class="warning">images</span> 資料夾。
          上傳後重新整理頁面，就會自動讀取圖片。若圖片要連到文章或商品頁，請編輯 <span class="warning">image-links.json</span>。
        </p>
        <input id="photoInput" type="file" accept="image/png,image/jpeg" multiple>
        <p class="note">
          手機相片必須先上傳到公開 HTTPS 圖片空間，LINE 才能分享。
          若要啟用這個功能，請在程式裡填入 Cloudinary 的 <span class="warning">cloud name</span> 和 <span class="warning">upload preset</span>。
        </p>
      </div>
      <div class="grid" id="phoneGrid" style="margin-top: 14px;"></div>
    </section>
  </main>

  <script>
    const LIFF_ID = "2010086405-TfMqpBlJ";

    // 請改成你的 GitHub images 資料夾上傳頁。
    // 格式通常是：https://github.com/你的帳號/你的repo/upload/main/images
    const GITHUB_IMAGES_UPLOAD_URL = "https://github.com/tedbear0314-ops/line-card/upload/main/images";
    const GITHUB_IMAGES_API_URL = "https://api.github.com/repos/tedbear0314-ops/line-card/contents/images?ref=main";
    const IMAGE_LINKS_URL = "image-links.json";
    const GOOGLE_SHEET_DATA_URL = "https://script.google.com/macros/s/AKfycbyUwM1x3S6jrYxGGe_pSAZZ2BB4Mw4qpsTohvjqqxAoYjtrymMZqWkx9guAfn9y09VJ-w/exec";

    // 手機臨時照片會直接上傳到 Cloudinary。
    // 請先到 Cloudinary 建立 unsigned upload preset，再填入 cloud name 與 preset 名稱。
    const CLOUDINARY_CLOUD_NAME = "dlknzcex3";
    const CLOUDINARY_UPLOAD_PRESET = "line_card_phone";
    const CLOUDINARY_UPLOAD_FOLDER = "line_card_phone";

    const imageGroups = {
      program: [],
      info: [],
      phone: []
    };

    const emptyMessages = {
      program: "目前還沒有節日圖片。請先到 GitHub 的 images 資料夾上傳圖片。",
      info: "目前還沒有資訊分享圖片。請先到 GitHub 的 images 資料夾上傳圖片。",
      phone: "目前還沒有手機相片。請先選擇手機裡的圖片。"
    };

    const selected = new Map();
    let imageLinks = {};
    const statusEl = document.querySelector("#status");
    const selectedCountEl = document.querySelector("#selectedCount");
    const shareButton = document.querySelector("#shareButton");
    const photoInput = document.querySelector("#photoInput");
    const githubUploadButton = document.querySelector("#githubUploadButton");
    let liffReady = false;

    function toAbsoluteUrl(url) {
      return new URL(url, window.location.href).href;
    }

    function isLiffLoggedIn() {
      return liffReady && liff.isLoggedIn();
    }

    function updateSelectionUi() {
      selectedCountEl.textContent = `已選 ${selected.size} 張`;
      shareButton.disabled = selected.size === 0;

      document.querySelectorAll(".card").forEach(card => {
        card.classList.toggle("selected", selected.has(card.dataset.id));
      });
    }

    function toggleImage(item) {
      if (selected.has(item.id)) {
        selected.delete(item.id);
      } else {
        selected.set(item.id, item);
      }
      updateSelectionUi();
    }

    function renderGrid(groupName, elementId) {
      const grid = document.querySelector(elementId);
      grid.innerHTML = "";

      if (imageGroups[groupName].length === 0) {
        const empty = document.createElement("p");
        empty.className = "note";
        empty.textContent = emptyMessages[groupName];
        grid.appendChild(empty);
        updateSelectionUi();
        return;
      }

      imageGroups[groupName].forEach(item => {
        const card = document.createElement("button");
        card.type = "button";
        card.className = "card";
        card.dataset.id = item.id;

        const check = document.createElement("span");
        check.className = "check";
        check.textContent = "✓";

        const image = document.createElement("img");
        image.src = item.url;
        image.alt = "分享圖片";
        image.loading = "lazy";

        card.append(check, image);
        card.addEventListener("click", () => toggleImage(item));
        grid.appendChild(card);
      });

      updateSelectionUi();
    }

    function getImageCategory(fileName) {
      const lowerName = fileName.toLowerCase();
      if (
        lowerName.includes("insurance") ||
        lowerName.includes("finance") ||
        lowerName.includes("news") ||
        lowerName.includes("保險") ||
        lowerName.includes("財經") ||
        lowerName.includes("新聞")
      ) {
        return "info";
      }
      return "program";
    }

    async function loadImageLinks() {
      try {
        const response = await fetch(IMAGE_LINKS_URL, { cache: "no-store" });
        if (!response.ok) throw new Error("讀不到圖片連結設定檔。");
        imageLinks = await response.json();
      } catch (error) {
        console.warn(error);
        imageLinks = {};
      }
    }

    function gcd(a, b) {
      return b === 0 ? a : gcd(b, a % b);
    }

    function getImageAspectRatio(url) {
      return new Promise(resolve => {
        const img = new Image();
        img.onload = () => {
          const width = img.naturalWidth || 20;
          const height = img.naturalHeight || 13;
          const divisor = gcd(width, height);
          resolve(`${Math.round(width / divisor)}:${Math.round(height / divisor)}`);
        };
        img.onerror = () => resolve("20:13");
        img.src = url;
      });
    }

    async function loadGithubImages() {
      try {
        statusEl.textContent = "讀取圖片";
        const response = await fetch(GITHUB_IMAGES_API_URL);
        if (!response.ok) throw new Error("讀不到 GitHub images 資料夾。");

        const files = await response.json();
        imageGroups.program = [];
        imageGroups.info = [];

        const imageFiles = files
          .filter(file => file.type === "file" && /\.(jpg|jpeg|png|webp)$/i.test(file.name))
          .map(async file => {
            const category = getImageCategory(file.name);
            const aspectRatio = await getImageAspectRatio(file.download_url);
            imageGroups[category].push({
              id: `${category}-${file.sha}`,
              category,
              fileName: file.name,
              url: file.download_url,
              linkUrl: imageLinks[file.name] || "",
              aspectRatio
            });
          });

        await Promise.all(imageFiles);

        renderGrid("program", "#programGrid");
        renderGrid("info", "#infoGrid");
        statusEl.textContent = isLiffLoggedIn() ? "已登入" : "未登入";
      } catch (error) {
        console.error(error);
        statusEl.textContent = "圖片錯誤";
        renderGrid("program", "#programGrid");
        renderGrid("info", "#infoGrid");
      }
    }

    async function loadSheetImages() {
      if (!GOOGLE_SHEET_DATA_URL) return false;

      try {
        statusEl.textContent = "讀取資料";
        const response = await fetch(GOOGLE_SHEET_DATA_URL, { cache: "no-store" });
        if (!response.ok) throw new Error("讀不到 Google Sheet 資料。");

        const rows = await response.json();
        if (!Array.isArray(rows)) throw new Error("Google Sheet 回傳格式不是陣列。");

        imageGroups.program = [];
        imageGroups.info = [];

        const enabledRows = rows.filter(row => {
          const enabled = row.enabled;
          return enabled === true || enabled === "TRUE" || enabled === "true" || enabled === 1 || enabled === "1";
        });

        const imageRows = enabledRows
          .filter(row => row.image_url)
          .map(async (row, index) => {
            const category = row.category === "info" ? "info" : "program";
            const aspectRatio = await getImageAspectRatio(row.image_url);
            imageGroups[category].push({
              id: `sheet-${category}-${index}-${row.created_at || row.image_url}`,
              category,
              fileName: "",
              url: row.image_url,
              linkUrl: row.link_url || "",
              aspectRatio
            });
          });

        await Promise.all(imageRows);

        renderGrid("program", "#programGrid");
        renderGrid("info", "#infoGrid");
        statusEl.textContent = isLiffLoggedIn() ? "已登入" : "未登入";
        return true;
      } catch (error) {
        console.warn(error);
        return false;
      }
    }

    function switchTab(tabName) {
      document.querySelectorAll(".tab").forEach(tab => {
        tab.classList.toggle("active", tab.dataset.tab === tabName);
      });

      document.querySelectorAll(".panel").forEach(panel => {
        panel.classList.remove("active");
      });

      document.querySelector(`#${tabName}Panel`).classList.add("active");
    }

    async function initLiff() {
      try {
        await liff.init({ liffId: LIFF_ID });
        liffReady = true;
        statusEl.textContent = isLiffLoggedIn() ? "已登入" : "未登入";
      } catch (error) {
        console.error(error);
        statusEl.textContent = "LIFF 錯誤";
        alert("LIFF 初始化失敗，請確認 LIFF ID 與 Endpoint URL 設定。");
      }
    }

    async function uploadToCloudinary(file) {
      if (!CLOUDINARY_CLOUD_NAME || !CLOUDINARY_UPLOAD_PRESET) {
        throw new Error("尚未設定 Cloudinary cloud name 或 upload preset。");
      }

      const formData = new FormData();
      formData.append("file", file);
      formData.append("upload_preset", CLOUDINARY_UPLOAD_PRESET);
      if (CLOUDINARY_UPLOAD_FOLDER) {
        formData.append("folder", CLOUDINARY_UPLOAD_FOLDER);
      }

      const response = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/image/upload`, {
        method: "POST",
        body: formData
      });

      if (!response.ok) {
        throw new Error("圖片上傳失敗。");
      }

      const data = await response.json();
      const width = data.width || 20;
      const height = data.height || 13;
      const divisor = gcd(width, height);

      return {
        url: data.secure_url,
        aspectRatio: `${Math.round(width / divisor)}:${Math.round(height / divisor)}`
      };
    }

    async function handlePhonePhotos(event) {
      const files = Array.from(event.target.files || []);
      if (files.length === 0) return;

      try {
        for (const [index, file] of files.entries()) {
          statusEl.textContent = `上傳 ${index + 1}/${files.length}`;
          const uploaded = await uploadToCloudinary(file);
          imageGroups.phone.push({
            id: `phone-${crypto.randomUUID()}`,
            url: uploaded.url,
            aspectRatio: uploaded.aspectRatio
          });
        }
        renderGrid("phone", "#phoneGrid");
        statusEl.textContent = isLiffLoggedIn() ? "已登入" : "未登入";
      } catch (error) {
        console.error(error);
        statusEl.textContent = "上傳錯誤";
        alert(error.message);
      }
    }

    function buildFlexBubble(item) {
      const imageUrl = toAbsoluteUrl(item.url);
      const hero = {
        type: "image",
        url: imageUrl,
        size: "full",
        aspectRatio: item.aspectRatio || "20:13",
        aspectMode: "fit",
        backgroundColor: "#FFFFFF"
      };

      if (item.linkUrl) {
        hero.action = {
          type: "uri",
          label: "查看詳細內容",
          uri: item.linkUrl
        };
      }

      return {
        type: "bubble",
        hero
      };
    }

    function buildFlexMessages(items) {
      const messages = [];

      for (let i = 0; i < items.length; i += 12) {
        const group = items.slice(i, i + 12);
        messages.push({
          type: "flex",
          altText: "圖片卡片分享",
          contents: {
            type: "carousel",
            contents: group.map(buildFlexBubble)
          }
        });
      }

      return messages;
    }

    async function shareSelectedImages() {
      if (!liffReady) {
        alert("LIFF 尚未初始化完成，請稍後再試。");
        return;
      }

      if (!liff.isLoggedIn()) {
        liff.login();
        return;
      }

      const items = Array.from(selected.values());
      if (items.length > 60) {
        alert("一次最多可分享 60 張，請少選幾張再試一次。");
        return;
      }

      const messageObjects = buildFlexMessages(items);

      try {
        statusEl.textContent = "分享中";
        const result = await liff.shareTargetPicker(messageObjects, { isMultiple: true });
        statusEl.textContent = result ? "已登入" : "已取消";
      } catch (error) {
        console.error(error);
        statusEl.textContent = "分享錯誤";
        alert("分享失敗，請確認圖片網址可公開讀取，並確認 LINE Developers 已啟用 Share target picker。");
      }
    }

    document.querySelectorAll(".tab").forEach(tab => {
      tab.addEventListener("click", () => switchTab(tab.dataset.tab));
    });

    shareButton.addEventListener("click", shareSelectedImages);
    photoInput.addEventListener("change", handlePhonePhotos);
    githubUploadButton.addEventListener("click", () => {
      if (!GITHUB_IMAGES_UPLOAD_URL) {
        alert("請先在 index.html 裡設定 GITHUB_IMAGES_UPLOAD_URL。");
        return;
      }

      window.open(GITHUB_IMAGES_UPLOAD_URL, "_blank", "noopener");
    });

    renderGrid("program", "#programGrid");
    renderGrid("info", "#infoGrid");
    loadImageLinks().then(async () => {
      const loadedFromSheet = await loadSheetImages();
      if (!loadedFromSheet) {
        await loadGithubImages();
      }
    });
    initLiff();
  </script>
</body>
</html>
