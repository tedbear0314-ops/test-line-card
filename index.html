<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>TED 客戶資訊分享</title>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    :root {
      --line: #06c755;
      --ink: #1f2937;
      --muted: #6b7280;
      --border: #d8dde6;
      --surface: #ffffff;
      --soft: #f4f7fb;
      --accent: #2563eb;
      --warn: #b45309;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Microsoft JhengHei", "Noto Sans TC", sans-serif;
      color: var(--ink);
      background: #eef3f8;
    }

    .app {
      width: min(960px, 100%);
      margin: 0 auto;
      padding: 18px;
    }

    header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      padding: 16px 0 14px;
    }

    h1 {
      margin: 0;
      font-size: 1.45rem;
      line-height: 1.35;
    }

    .status {
      min-width: 88px;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--muted);
      font-size: 0.82rem;
      text-align: center;
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin: 8px 0 16px;
    }

    .tab {
      min-height: 48px;
      padding: 13px 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--ink);
      font-size: 1rem;
      font-weight: 900;
      cursor: pointer;
    }

    .tab.active {
      border-color: var(--accent);
      background: #eaf1ff;
      color: #1746a2;
    }

    .panel {
      display: none;
    }

    .panel.active {
      display: block;
    }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 2;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      padding: 12px;
      margin-bottom: 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 8px 20px rgba(31, 41, 55, 0.08);
    }

    .intro-panel {
      display: none;
      padding: 12px;
      margin: -4px 0 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: 0 6px 18px rgba(31, 41, 55, 0.06);
    }

    .intro-panel.show {
      display: block;
    }

    .intro-panel label {
      display: block;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 800;
    }

    .intro-panel textarea {
      width: 100%;
      min-height: 94px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--ink);
      font: inherit;
      line-height: 1.55;
      resize: vertical;
      outline: none;
    }

    .intro-panel textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.16);
    }

    .toolbar-options {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .count {
      color: var(--muted);
      font-size: 0.92rem;
    }

    .toggle {
      min-height: 42px;
      display: inline-flex;
      gap: 8px;
      align-items: center;
      padding: 8px 11px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--muted);
      font-size: 0.92rem;
      font-weight: 800;
      cursor: pointer;
    }

    .toggle:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .toggle-switch {
      width: 36px;
      height: 20px;
      position: relative;
      border-radius: 999px;
      background: #cbd5e1;
      transition: background 0.18s ease;
    }

    .toggle-switch::after {
      content: "";
      position: absolute;
      top: 3px;
      left: 3px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #fff;
      transition: transform 0.18s ease;
    }

    .toggle.active {
      border-color: rgba(6, 199, 85, 0.45);
      color: var(--ink);
    }

    .toggle.active .toggle-switch {
      background: var(--line);
    }

    .toggle.active .toggle-switch::after {
      transform: translateX(16px);
    }

    .primary {
      width: auto;
      min-width: 132px;
      padding: 12px 16px;
      border: 0;
      border-radius: 8px;
      background: var(--line);
      color: white;
      font-size: 0.98rem;
      font-weight: 800;
      cursor: pointer;
    }

    .primary:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }

    .secondary {
      display: inline-flex;
      width: 100%;
      min-height: 44px;
      align-items: center;
      justify-content: center;
      margin-top: 12px;
      padding: 11px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--ink);
      font-size: 0.95rem;
      font-weight: 800;
      text-decoration: none;
      cursor: pointer;
    }

    .secondary:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      padding: 4px 2px 20px;
    }

    .card {
      position: relative;
      overflow: hidden;
      border: 2px solid transparent;
      border-radius: 8px;
      background: var(--surface);
      box-shadow: 0 6px 18px rgba(31, 41, 55, 0.08);
      cursor: pointer;
    }

    .card.selected {
      border-color: var(--line);
    }

    .card:focus {
      outline: none;
    }

    .card:focus-visible {
      outline: 3px solid rgba(37, 99, 235, 0.3);
      outline-offset: 2px;
    }

    .card img {
      display: block;
      width: 100%;
      aspect-ratio: 1.45 / 1;
      object-fit: contain;
      background: #ffffff;
    }

    .check {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.92);
      color: transparent;
      font-weight: 900;
    }

    .selected .check {
      background: var(--line);
      color: white;
    }

    .upload-box {
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
    }

    input[type="file"] {
      width: 100%;
      padding: 12px;
      border: 1px dashed var(--border);
      border-radius: 8px;
      background: var(--soft);
    }

    .note {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.6;
    }

    .warning {
      color: var(--warn);
      font-weight: 700;
    }

    @media (max-width: 560px) {
      .app {
        padding: 12px;
      }

      header {
        align-items: stretch;
      }

      h1 {
        font-size: 1.18rem;
      }

      .tabs {
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .tab {
        min-height: 54px;
        font-size: 1.08rem;
      }

      .toolbar {
        align-items: stretch;
        flex-direction: column;
      }

      .toolbar-options {
        justify-content: space-between;
      }

      .primary {
        width: 100%;
      }

      .card {
        width: 100%;
      }

      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <div>
        <h1>客戶 LINE 圖片分享</h1>
        <p class="note">選好圖片後，LINE 會讓你選擇要分享的客戶或群組。</p>
      </div>
      <div class="status" id="status">初始化</div>
    </header>

    <nav class="tabs" aria-label="圖片分類">
      <button class="tab active" type="button" data-tab="program">節日定聯</button>
      <button class="tab" type="button" data-tab="info">資訊分享</button>
      <button class="tab" type="button" id="adminTabButton">上傳後台</button>
    </nav>

    <section class="toolbar">
      <div class="toolbar-options">
        <div class="count" id="selectedCount">已選 0 張</div>
        <button class="toggle" type="button" id="introToggle" aria-pressed="false">
          <span class="toggle-switch" aria-hidden="true"></span>
          <span>開場文字</span>
        </button>
        <button class="toggle" type="button" id="businessCardToggle" aria-pressed="false" disabled>
          <span class="toggle-switch" aria-hidden="true"></span>
          <span>附名片</span>
        </button>
      </div>
      <button class="primary" type="button" id="shareButton" disabled>分享到 LINE</button>
    </section>

    <section class="intro-panel" id="introPanel">
      <label for="introText">開場文字內容</label>
      <textarea id="introText" maxlength="500" placeholder="先打好要一起送出的文字"></textarea>
    </section>

    <section class="panel active" id="programPanel">
      <div class="grid" id="programGrid"></div>
    </section>

    <section class="panel" id="infoPanel">
      <div class="grid" id="infoGrid"></div>
    </section>

  </main>

    <script>
    const LIFF_ID = "2010086405-TfMqpBlJ";

    // 測試版固定圖片資料來源：admin.html 上傳到 Cloudinary，再寫入 Google Sheet。
    const GOOGLE_SHEET_DATA_URL = "https://script.google.com/macros/s/AKfycbyUwM1x3S6jrYxGGe_pSAZZ2BB4Mw4qpsTohvjqqxAoYjtrymMZqWkx9guAfn9y09VJ-w/exec";

    const imageGroups = {
      program: [],
      info: []
    };

    const emptyMessages = {
      program: "目前還沒有節日圖片。請先到圖片上傳後台新增資料。",
      info: "目前還沒有資訊分享圖片。請先到圖片上傳後台新增資料。"
    };

    const introMessages = {
      program: "送上一份小小祝福，願你今天一切順心。",
      info: "這份資訊給你參考。如果想確認自己的狀況，直接回我就好。",
      mixed: "整理幾份內容給你參考。有問題可以直接回我。"
    };

    const selected = new Map();
    const statusEl = document.querySelector("#status");
    const selectedCountEl = document.querySelector("#selectedCount");
    const shareButton = document.querySelector("#shareButton");
    const adminTabButton = document.querySelector("#adminTabButton");
    const introToggle = document.querySelector("#introToggle");
    const businessCardToggle = document.querySelector("#businessCardToggle");
    const introPanel = document.querySelector("#introPanel");
    const introTextInput = document.querySelector("#introText");
    let liffReady = false;
    let includeIntroText = false;
    let includeBusinessCard = false;
    let businessCardItem = null;
    let lastSuggestedIntroText = "";

    function toAbsoluteUrl(url) {
      return new URL(url, window.location.href).href;
    }

    function isLiffLoggedIn() {
      return liffReady && liff.isLoggedIn();
    }

    function updateSelectionUi() {
      selectedCountEl.textContent = `已選 ${selected.size} 張`;
      shareButton.disabled = selected.size === 0;

      document.querySelectorAll(".card").forEach(card => {
        card.classList.toggle("selected", selected.has(card.dataset.id));
      });

      updateIntroTextSuggestion();
    }

    function toggleImage(item) {
      if (selected.has(item.id)) {
        selected.delete(item.id);
      } else {
        selected.set(item.id, item);
      }
      updateSelectionUi();
    }

    function renderGrid(groupName, elementId) {
      const grid = document.querySelector(elementId);
      grid.innerHTML = "";

      if (imageGroups[groupName].length === 0) {
        const empty = document.createElement("p");
        empty.className = "note";
        empty.textContent = emptyMessages[groupName];
        grid.appendChild(empty);
        updateSelectionUi();
        return;
      }

      imageGroups[groupName].forEach(item => {
        const card = document.createElement("button");
        card.type = "button";
        card.className = "card";
        card.dataset.id = item.id;

        const check = document.createElement("span");
        check.className = "check";
        check.textContent = "✓";

        const image = document.createElement("img");
        image.src = item.url;
        image.alt = "分享圖片";
        image.loading = "lazy";

        card.append(check, image);
        card.addEventListener("click", () => toggleImage(item));
        grid.appendChild(card);
      });

      updateSelectionUi();
    }

    function gcd(a, b) {
      return b === 0 ? a : gcd(b, a % b);
    }

    function cleanSheetText(value) {
      const text = String(value || "").trim();
      if (/^\d{4}-\d{2}-\d{2}T/.test(text)) return "";
      return text;
    }

    function getImageAspectRatio(url) {
      return new Promise(resolve => {
        const img = new Image();
        img.onload = () => {
          const width = img.naturalWidth || 20;
          const height = img.naturalHeight || 13;
          const divisor = gcd(width, height);
          resolve(`${Math.round(width / divisor)}:${Math.round(height / divisor)}`);
        };
        img.onerror = () => resolve("20:13");
        img.src = url;
      });
    }

    async function loadSheetImages() {
      try {
        statusEl.textContent = "讀取資料";
        const response = await fetch(GOOGLE_SHEET_DATA_URL, { cache: "no-store" });
        if (!response.ok) throw new Error("讀不到 Google Sheet 資料。");

        const data = await response.json();
        const rows = Array.isArray(data) ? data : data.rows;
        if (!Array.isArray(rows)) throw new Error("Google Sheet 回傳格式不是陣列。");

        imageGroups.program = [];
        imageGroups.info = [];
        businessCardItem = null;
        const businessCardItems = [];

        const enabledRows = rows.filter(row => {
          const enabled = row.enabled;
          return enabled === true || enabled === "TRUE" || enabled === "true" || enabled === 1 || enabled === "1";
        });

        const imageRows = enabledRows
          .filter(row => row.image_url)
          .map(async (row, index) => {
            const aspectRatio = await getImageAspectRatio(row.image_url);
            if (row.category === "business_card") {
              businessCardItems.push({
                id: `business-card-${index}-${row.created_at || row.image_url}`,
                category: "business_card",
                fileName: "",
                url: row.image_url,
                linkUrl: row.link_url || "",
                displayName: cleanSheetText(row.display_name),
                companyName: cleanSheetText(row.company_name),
                jobTitle: cleanSheetText(row.job_title),
                phone: cleanSheetText(row.phone),
                lineFriendUrl: cleanSheetText(row.line_friend_url || row.link_url),
                tagline: cleanSheetText(row.tagline),
                aspectRatio,
                createdAt: row.created_at || ""
              });
              return;
            }

            const category = row.category === "info" ? "info" : "program";
            imageGroups[category].push({
              id: `sheet-${category}-${index}-${row.created_at || row.image_url}`,
              category,
              fileName: "",
              url: row.image_url,
              linkUrl: row.link_url || "",
              aspectRatio
            });
          });

        await Promise.all(imageRows);
        businessCardItem = businessCardItems
          .sort((a, b) => String(b.createdAt).localeCompare(String(a.createdAt)))[0] || null;

        renderGrid("program", "#programGrid");
        renderGrid("info", "#infoGrid");
        updateBusinessCardToggle();
        statusEl.textContent = isLiffLoggedIn() ? "已登入" : "未登入";
      } catch (error) {
        console.error(error);
        statusEl.textContent = "資料錯誤";
        imageGroups.program = [];
        imageGroups.info = [];
        businessCardItem = null;
        updateBusinessCardToggle();
        renderGrid("program", "#programGrid");
        renderGrid("info", "#infoGrid");
        alert("讀取 Google Sheet 失敗。請確認 Apps Script 已加入 doGet，並重新部署成最新版本。");
      }
    }

    function switchTab(tabName) {
      document.querySelectorAll(".tab").forEach(tab => {
        tab.classList.toggle("active", tab.dataset.tab === tabName);
      });

      document.querySelectorAll(".panel").forEach(panel => {
        panel.classList.remove("active");
      });

      document.querySelector(`#${tabName}Panel`).classList.add("active");
    }

    async function initLiff() {
      try {
        await liff.init({ liffId: LIFF_ID });
        liffReady = true;
        statusEl.textContent = isLiffLoggedIn() ? "已登入" : "未登入";
      } catch (error) {
        console.error(error);
        statusEl.textContent = "LIFF 錯誤";
        alert("LIFF 初始化失敗，請確認 LIFF ID 與 Endpoint URL 設定。");
      }
    }

    function buildFlexBubble(item) {
      if (item.category === "business_card") {
        return buildBusinessCardBubble(item);
      }

      const imageUrl = toAbsoluteUrl(item.url);
      const hero = {
        type: "image",
        url: imageUrl,
        size: "full",
        aspectRatio: item.aspectRatio || "20:13",
        aspectMode: "fit",
        backgroundColor: "#FFFFFF"
      };

      if (item.linkUrl) {
        hero.action = {
          type: "uri",
          label: "查看詳細內容",
          uri: item.linkUrl
        };
      }

      return {
        type: "bubble",
        hero
      };
    }

    function normalizePhoneUri(phone) {
      const normalized = String(phone || "").replace(/[^\d+]/g, "");
      return normalized ? `tel:${normalized}` : "";
    }

    function buildBusinessCardBubble(item) {
      const imageUrl = toAbsoluteUrl(item.url);
      const logoUrl = "https://www.nanshanlife.com.tw/nsclub/resources/images/logo1.png";
      const theme = {
        navy: "#064887",
        deepNavy: "#05366B",
        background: "#F4F8FB",
        surface: "#FFFFFF",
        ink: "#0F2742",
        muted: "#667085",
        accent: "#D7A928",
        line: "#06C755",
        phone: "#0758A8",
        divider: "#D7E3EF"
      };

      const bodyContents = [
        {
          type: "image",
          url: logoUrl,
          size: "md",
          aspectRatio: "4:1",
          aspectMode: "fit",
          align: "start"
        }
      ];
      const actionButtons = [];
      const phoneUri = normalizePhoneUri(item.phone);
      const identityContents = [];

      if (item.displayName) {
        identityContents.push({
          type: "text",
          text: item.displayName,
          weight: "bold",
          size: "xxl",
          color: theme.deepNavy,
          wrap: true,
          margin: "sm"
        });
      }

      const subtitle = [item.jobTitle || "保險顧問"].filter(Boolean).join(" | ");
      if (subtitle) {
        identityContents.push({
          type: "text",
          text: subtitle,
          size: "sm",
          color: theme.navy,
          wrap: true,
          margin: "sm"
        });
      }

      if (item.companyName) {
        identityContents.push({
          type: "text",
          text: item.companyName,
          size: "xs",
          color: theme.muted,
          wrap: true,
          margin: "sm"
        });
      }

      if (item.tagline) {
        identityContents.push({
          type: "text",
          text: item.tagline,
          weight: "bold",
          size: "sm",
          color: theme.deepNavy,
          wrap: true,
          margin: "sm"
        });
      }

      bodyContents.push({
        type: "box",
        layout: "vertical",
        spacing: "sm",
        margin: "xl",
        contents: [
          {
            type: "image",
            url: imageUrl,
            size: "full",
            aspectRatio: "20:13",
            aspectMode: "fit",
            backgroundColor: "#FFFFFF",
            flex: 0
          },
          {
            type: "box",
            layout: "vertical",
            spacing: "sm",
            margin: "lg",
            contents: identityContents
          }
        ]
      });

      bodyContents.push({
        type: "box",
        layout: "vertical",
        height: "5px",
        margin: "xl",
        backgroundColor: theme.navy,
        contents: []
      });

      if (phoneUri) {
        actionButtons.push({
          type: "button",
          style: "primary",
          color: theme.phone,
          height: "sm",
          action: {
            type: "uri",
            label: "來電",
            uri: phoneUri
          }
        });
      }

      if (item.lineFriendUrl) {
        actionButtons.push({
          type: "button",
          style: "primary",
          color: theme.line,
          height: "sm",
          action: {
            type: "uri",
            label: "加 LINE",
            uri: item.lineFriendUrl
          }
        });
      }

      if (item.shareUrl) {
        actionButtons.push({
          type: "button",
          style: "secondary",
          height: "sm",
          action: {
            type: "uri",
            label: "轉分享",
            uri: item.shareUrl
          }
        });
      }

      if (actionButtons.length > 0) {
        bodyContents.push({
          type: "box",
          layout: actionButtons.length > 2 ? "vertical" : "horizontal",
          spacing: "sm",
          margin: "xl",
          contents: actionButtons
        });
      }

      bodyContents.push({
        type: "box",
        layout: "horizontal",
        margin: "xl",
        paddingAll: "12px",
        borderColor: theme.divider,
        borderWidth: "1px",
        cornerRadius: "10px",
        spacing: "sm",
        contents: [
          {
            type: "text",
            text: "保障規劃",
            weight: "bold",
            size: "xxs",
            color: theme.navy,
            align: "center",
            flex: 1
          },
          {
            type: "text",
            text: "家庭守護",
            weight: "bold",
            size: "xxs",
            color: theme.navy,
            align: "center",
            flex: 1
          },
          {
            type: "text",
            text: "長期陪伴",
            weight: "bold",
            size: "xxs",
            color: theme.navy,
            align: "center",
            flex: 1
          }
        ]
      });

      return {
        type: "bubble",
        body: {
          type: "box",
          layout: "vertical",
          spacing: "md",
          justifyContent: "center",
          paddingAll: "22px",
          backgroundColor: theme.background,
          contents: bodyContents
        },
        styles: {
          body: {
            backgroundColor: theme.background
          }
        }
      };
    }

    function buildFlexMessages(items) {
      const messages = [];

      for (let i = 0; i < items.length; i += 12) {
        const group = items.slice(i, i + 12);
        messages.push({
          type: "flex",
          altText: "圖片卡片分享",
          contents: {
            type: "carousel",
            contents: group.map(buildFlexBubble)
          }
        });
      }

      return messages;
    }

    function getCloudinaryImageUrl(url, transformation) {
      const absoluteUrl = toAbsoluteUrl(url);
      return absoluteUrl.replace("/image/upload/", `/image/upload/${transformation}/`);
    }

    function getLineImageUrls(url) {
      const absoluteUrl = toAbsoluteUrl(url);
      if (!absoluteUrl.includes("/image/upload/")) {
        return {
          originalContentUrl: absoluteUrl,
          previewImageUrl: absoluteUrl
        };
      }

      return {
        originalContentUrl: getCloudinaryImageUrl(absoluteUrl, "f_jpg,q_auto:good,w_1200,c_limit"),
        previewImageUrl: getCloudinaryImageUrl(absoluteUrl, "f_jpg,q_auto:eco,w_640,c_limit")
      };
    }

    function getSharePageUrl(shareId) {
      const url = new URL("share.html", window.location.href);
      url.searchParams.set("id", shareId);
      return url.href;
    }

    function cleanShareItem(item, index) {
      return {
        id: `share-item-${index + 1}`,
        sourceId: item.id || "",
        category: item.category || "",
        url: item.url || "",
        linkUrl: item.linkUrl || "",
        displayName: item.displayName || "",
        companyName: item.companyName || "",
        jobTitle: item.jobTitle || "",
        phone: item.phone || "",
        lineFriendUrl: item.lineFriendUrl || "",
        tagline: item.tagline || "",
        aspectRatio: item.aspectRatio || ""
      };
    }

    async function createShareSet(items, introText, includeCard) {
      const response = await fetch(GOOGLE_SHEET_DATA_URL, {
        method: "POST",
        body: JSON.stringify({
          action: "create_share_set",
          enabled: true,
          intro_text: introText || "",
          include_business_card: includeCard,
          items: items.map(cleanShareItem),
          created_at: new Date().toISOString(),
          note: "二次分享"
        })
      });

      if (!response.ok) throw new Error("建立分享包失敗。");
      const result = await response.json();
      if (!result.share_id) throw new Error("Apps Script 沒有回傳 share_id。");
      return result.share_id;
    }

    function getIntroText(items) {
      const categories = new Set(items.map(item => item.category));
      if (categories.size > 1) return introMessages.mixed;
      return introMessages[categories.values().next().value] || introMessages.mixed;
    }

    function updateIntroTextSuggestion() {
      if (!includeIntroText) return;

      const items = Array.from(selected.values());
      const suggestedText = items.length > 0 ? getIntroText(items) : introMessages.mixed;
      if (!introTextInput.value.trim() || introTextInput.value === lastSuggestedIntroText) {
        introTextInput.value = suggestedText;
      }
      lastSuggestedIntroText = suggestedText;
    }

    function updateBusinessCardToggle() {
      if (businessCardItem) {
        businessCardToggle.disabled = false;
        businessCardToggle.title = "分享時附上數位名片";
        return;
      }

      includeBusinessCard = false;
      businessCardToggle.disabled = true;
      businessCardToggle.classList.remove("active");
      businessCardToggle.setAttribute("aria-pressed", "false");
      businessCardToggle.title = "尚未在上傳後台新增數位名片";
    }

    async function shareSelectedImages() {
      if (!liffReady) {
        alert("LIFF 尚未初始化完成，請稍後再試。");
        return;
      }

      if (!liff.isLoggedIn()) {
        liff.login();
        return;
      }

      const items = Array.from(selected.values());
      const introText = introTextInput.value.trim();
      const shouldSendIntroText = includeIntroText && introText;
      const extraCardCount = includeBusinessCard ? 1 : 0;
      const maxItems = (shouldSendIntroText ? 48 : 60) - extraCardCount;
      if (items.length > maxItems) {
        alert(`目前最多可分享 ${maxItems} 張，請少選幾張再試一次。`);
        return;
      }

      try {
        statusEl.textContent = "建立分享包";
        const shareItems = includeBusinessCard
          ? [...items, businessCardItem]
          : items;
        console.log("建立分享包內容", shareItems.map(item => ({
          category: item.category,
          url: item.url,
          displayName: item.displayName || ""
        })));
        const shareId = await createShareSet(shareItems, shouldSendIntroText ? introText : "", includeBusinessCard);
        const shareUrl = getSharePageUrl(shareId);
        const messageItems = includeBusinessCard
          ? [...items, { ...businessCardItem, shareUrl }]
          : items;
        const messageObjects = buildFlexMessages(messageItems);
        if (shouldSendIntroText) {
          messageObjects.unshift({
            type: "text",
            text: introText
          });
        }

        statusEl.textContent = "分享中";
        const result = await liff.shareTargetPicker(messageObjects, { isMultiple: true });
        statusEl.textContent = result ? "已登入" : "已取消";
      } catch (error) {
        console.error(error);
        statusEl.textContent = "分享錯誤";
        alert("分享失敗，請確認 Apps Script 已重新部署，圖片網址可公開讀取，並確認 LINE Developers 已啟用 Share target picker。");
      }
    }

    document.querySelectorAll(".tab[data-tab]").forEach(tab => {
      tab.addEventListener("click", () => switchTab(tab.dataset.tab));
    });

    shareButton.addEventListener("click", shareSelectedImages);
    introToggle.addEventListener("click", () => {
      includeIntroText = !includeIntroText;
      introToggle.classList.toggle("active", includeIntroText);
      introToggle.setAttribute("aria-pressed", String(includeIntroText));
      introPanel.classList.toggle("show", includeIntroText);
      updateIntroTextSuggestion();
      if (includeIntroText) {
        introTextInput.focus();
      }
    });
    businessCardToggle.addEventListener("click", () => {
      if (!businessCardItem) {
        alert("尚未上傳數位名片。請先到上傳後台新增一張「數位名片」。");
        return;
      }
      includeBusinessCard = !includeBusinessCard;
      businessCardToggle.classList.toggle("active", includeBusinessCard);
      businessCardToggle.setAttribute("aria-pressed", String(includeBusinessCard));
    });

    adminTabButton.addEventListener("click", () => {
      window.location.href = "admin.html";
    });

    renderGrid("program", "#programGrid");
    renderGrid("info", "#infoGrid");
    loadSheetImages();
    initLiff();
  </script>
</body>
</html>
