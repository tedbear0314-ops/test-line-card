<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>TED 客戶資訊分享</title>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    :root {
      --line: #06c755;
      --ink: #1f2937;
      --muted: #6b7280;
      --border: #d8dde6;
      --surface: #ffffff;
      --soft: #f4f7fb;
      --accent: #2563eb;
      --warn: #b45309;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Microsoft JhengHei", "Noto Sans TC", sans-serif;
      color: var(--ink);
      background: #eef3f8;
    }

    .app {
      width: min(960px, 100%);
      margin: 0 auto;
      padding: 18px;
    }

    header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      padding: 16px 0 14px;
    }

    h1 {
      margin: 0;
      font-size: 1.45rem;
      line-height: 1.35;
    }

    .status {
      min-width: 88px;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--muted);
      font-size: 0.82rem;
      text-align: center;
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin: 8px 0 16px;
    }

    .tab {
      padding: 11px 8px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--ink);
      font-weight: 700;
      cursor: pointer;
    }

    .tab.active {
      border-color: var(--accent);
      background: #eaf1ff;
      color: #1746a2;
    }

    .panel {
      display: none;
    }

    .panel.active {
      display: block;
    }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 2;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      padding: 12px;
      margin-bottom: 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 8px 20px rgba(31, 41, 55, 0.08);
    }

    .count {
      color: var(--muted);
      font-size: 0.92rem;
    }

    .primary {
      width: auto;
      min-width: 132px;
      padding: 12px 16px;
      border: 0;
      border-radius: 8px;
      background: var(--line);
      color: white;
      font-size: 0.98rem;
      font-weight: 800;
      cursor: pointer;
    }

    .primary:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }

    .secondary {
      display: inline-flex;
      width: 100%;
      min-height: 44px;
      align-items: center;
      justify-content: center;
      margin-top: 12px;
      padding: 11px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--ink);
      font-size: 0.95rem;
      font-weight: 800;
      text-decoration: none;
      cursor: pointer;
    }

    .secondary:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      padding: 4px 2px 20px;
    }

    .card {
      position: relative;
      overflow: hidden;
      border: 2px solid transparent;
      border-radius: 8px;
      background: var(--surface);
      box-shadow: 0 6px 18px rgba(31, 41, 55, 0.08);
      cursor: pointer;
    }

    .card.selected {
      border-color: var(--line);
    }

    .card:focus {
      outline: none;
    }

    .card:focus-visible {
      outline: 3px solid rgba(37, 99, 235, 0.3);
      outline-offset: 2px;
    }

    .card img {
      display: block;
      width: 100%;
      aspect-ratio: 1.45 / 1;
      object-fit: contain;
      background: #ffffff;
    }

    .check {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.92);
      color: transparent;
      font-weight: 900;
    }

    .selected .check {
      background: var(--line);
      color: white;
    }

    .upload-box {
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
    }

    input[type="file"] {
      width: 100%;
      padding: 12px;
      border: 1px dashed var(--border);
      border-radius: 8px;
      background: var(--soft);
    }

    .note {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.6;
    }

    .warning {
      color: var(--warn);
      font-weight: 700;
    }

    @media (max-width: 560px) {
      .app {
        padding: 12px;
      }

      header {
        align-items: stretch;
      }

      h1 {
        font-size: 1.18rem;
      }

      .tabs {
        grid-template-columns: 1fr;
      }

      .toolbar {
        align-items: stretch;
        flex-direction: column;
      }

      .primary {
        width: 100%;
      }

      .card {
        width: 100%;
      }

      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <div>
        <h1>客戶 LINE 圖片分享</h1>
        <p class="note">選好圖片後，LINE 會讓你選擇要分享的客戶或群組。</p>
      </div>
      <div class="status" id="status">初始化</div>
    </header>

    <nav class="tabs" aria-label="圖片分類">
      <button class="tab active" type="button" data-tab="program">節日定聯</button>
      <button class="tab" type="button" data-tab="info">資訊分享</button>
      <button class="tab" type="button" id="adminTabButton">上傳後台</button>
    </nav>

    <section class="toolbar">
      <div class="count" id="selectedCount">已選 0 張</div>
      <button class="primary" type="button" id="shareButton" disabled>分享到 LINE</button>
    </section>

    <section class="panel active" id="programPanel">
      <div class="grid" id="programGrid"></div>
    </section>

    <section class="panel" id="infoPanel">
      <div class="grid" id="infoGrid"></div>
    </section>

  </main>

    <script>
    const LIFF_ID = "2010086405-TfMqpBlJ";

    // 測試版固定圖片資料來源：admin.html 上傳到 Cloudinary，再寫入 Google Sheet。
    const GOOGLE_SHEET_DATA_URL = "https://script.google.com/macros/s/AKfycbyUwM1x3S6jrYxGGe_pSAZZ2BB4Mw4qpsTohvjqqxAoYjtrymMZqWkx9guAfn9y09VJ-w/exec";

    const imageGroups = {
      program: [],
      info: []
    };

    const emptyMessages = {
      program: "目前還沒有節日圖片。請先到圖片上傳後台新增資料。",
      info: "目前還沒有資訊分享圖片。請先到圖片上傳後台新增資料。"
    };

    const selected = new Map();
    const statusEl = document.querySelector("#status");
    const selectedCountEl = document.querySelector("#selectedCount");
    const shareButton = document.querySelector("#shareButton");
    const adminTabButton = document.querySelector("#adminTabButton");
    let liffReady = false;

    function toAbsoluteUrl(url) {
      return new URL(url, window.location.href).href;
    }

    function isLiffLoggedIn() {
      return liffReady && liff.isLoggedIn();
    }

    function updateSelectionUi() {
      selectedCountEl.textContent = `已選 ${selected.size} 張`;
      shareButton.disabled = selected.size === 0;

      document.querySelectorAll(".card").forEach(card => {
        card.classList.toggle("selected", selected.has(card.dataset.id));
      });
    }

    function toggleImage(item) {
      if (selected.has(item.id)) {
        selected.delete(item.id);
      } else {
        selected.set(item.id, item);
      }
      updateSelectionUi();
    }

    function renderGrid(groupName, elementId) {
      const grid = document.querySelector(elementId);
      grid.innerHTML = "";

      if (imageGroups[groupName].length === 0) {
        const empty = document.createElement("p");
        empty.className = "note";
        empty.textContent = emptyMessages[groupName];
        grid.appendChild(empty);
        updateSelectionUi();
        return;
      }

      imageGroups[groupName].forEach(item => {
        const card = document.createElement("button");
        card.type = "button";
        card.className = "card";
        card.dataset.id = item.id;

        const check = document.createElement("span");
        check.className = "check";
        check.textContent = "✓";

        const image = document.createElement("img");
        image.src = item.url;
        image.alt = "分享圖片";
        image.loading = "lazy";

        card.append(check, image);
        card.addEventListener("click", () => toggleImage(item));
        grid.appendChild(card);
      });

      updateSelectionUi();
    }

    function gcd(a, b) {
      return b === 0 ? a : gcd(b, a % b);
    }

    function getImageAspectRatio(url) {
      return new Promise(resolve => {
        const img = new Image();
        img.onload = () => {
          const width = img.naturalWidth || 20;
          const height = img.naturalHeight || 13;
          const divisor = gcd(width, height);
          resolve(`${Math.round(width / divisor)}:${Math.round(height / divisor)}`);
        };
        img.onerror = () => resolve("20:13");
        img.src = url;
      });
    }

    async function loadSheetImages() {
      try {
        statusEl.textContent = "讀取資料";
        const response = await fetch(GOOGLE_SHEET_DATA_URL, { cache: "no-store" });
        if (!response.ok) throw new Error("讀不到 Google Sheet 資料。");

        const data = await response.json();
        const rows = Array.isArray(data) ? data : data.rows;
        if (!Array.isArray(rows)) throw new Error("Google Sheet 回傳格式不是陣列。");

        imageGroups.program = [];
        imageGroups.info = [];

        const enabledRows = rows.filter(row => {
          const enabled = row.enabled;
          return enabled === true || enabled === "TRUE" || enabled === "true" || enabled === 1 || enabled === "1";
        });

        const imageRows = enabledRows
          .filter(row => row.image_url)
          .map(async (row, index) => {
            const category = row.category === "info" ? "info" : "program";
            const aspectRatio = await getImageAspectRatio(row.image_url);
            imageGroups[category].push({
              id: `sheet-${category}-${index}-${row.created_at || row.image_url}`,
              category,
              fileName: "",
              url: row.image_url,
              linkUrl: row.link_url || "",
              aspectRatio
            });
          });

        await Promise.all(imageRows);

        renderGrid("program", "#programGrid");
        renderGrid("info", "#infoGrid");
        statusEl.textContent = isLiffLoggedIn() ? "已登入" : "未登入";
      } catch (error) {
        console.error(error);
        statusEl.textContent = "資料錯誤";
        imageGroups.program = [];
        imageGroups.info = [];
        renderGrid("program", "#programGrid");
        renderGrid("info", "#infoGrid");
        alert("讀取 Google Sheet 失敗。請確認 Apps Script 已加入 doGet，並重新部署成最新版本。");
      }
    }

    function switchTab(tabName) {
      document.querySelectorAll(".tab").forEach(tab => {
        tab.classList.toggle("active", tab.dataset.tab === tabName);
      });

      document.querySelectorAll(".panel").forEach(panel => {
        panel.classList.remove("active");
      });

      document.querySelector(`#${tabName}Panel`).classList.add("active");
    }

    async function initLiff() {
      try {
        await liff.init({ liffId: LIFF_ID });
        liffReady = true;
        statusEl.textContent = isLiffLoggedIn() ? "已登入" : "未登入";
      } catch (error) {
        console.error(error);
        statusEl.textContent = "LIFF 錯誤";
        alert("LIFF 初始化失敗，請確認 LIFF ID 與 Endpoint URL 設定。");
      }
    }

    function buildFlexBubble(item) {
      const imageUrl = toAbsoluteUrl(item.url);
      const hero = {
        type: "image",
        url: imageUrl,
        size: "full",
        aspectRatio: item.aspectRatio || "20:13",
        aspectMode: "fit",
        backgroundColor: "#FFFFFF"
      };

      if (item.linkUrl) {
        hero.action = {
          type: "uri",
          label: "查看詳細內容",
          uri: item.linkUrl
        };
      }

      return {
        type: "bubble",
        hero
      };
    }

    function buildFlexMessages(items) {
      const messages = [];

      for (let i = 0; i < items.length; i += 12) {
        const group = items.slice(i, i + 12);
        messages.push({
          type: "flex",
          altText: "圖片卡片分享",
          contents: {
            type: "carousel",
            contents: group.map(buildFlexBubble)
          }
        });
      }

      return messages;
    }

    async function shareSelectedImages() {
      if (!liffReady) {
        alert("LIFF 尚未初始化完成，請稍後再試。");
        return;
      }

      if (!liff.isLoggedIn()) {
        liff.login();
        return;
      }

      const items = Array.from(selected.values());
      if (items.length > 60) {
        alert("一次最多可分享 60 張，請少選幾張再試一次。");
        return;
      }

      const messageObjects = buildFlexMessages(items);

      try {
        statusEl.textContent = "分享中";
        const result = await liff.shareTargetPicker(messageObjects, { isMultiple: true });
        statusEl.textContent = result ? "已登入" : "已取消";
      } catch (error) {
        console.error(error);
        statusEl.textContent = "分享錯誤";
        alert("分享失敗，請確認圖片網址可公開讀取，並確認 LINE Developers 已啟用 Share target picker。");
      }
    }

    document.querySelectorAll(".tab[data-tab]").forEach(tab => {
      tab.addEventListener("click", () => switchTab(tab.dataset.tab));
    });

    shareButton.addEventListener("click", shareSelectedImages);
    adminTabButton.addEventListener("click", () => {
      window.location.href = "admin.html";
    });

    renderGrid("program", "#programGrid");
    renderGrid("info", "#infoGrid");
    loadSheetImages();
    initLiff();
  </script>
</body>
</html>
